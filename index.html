<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brand Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6fb;
      min-height: 100vh;
      color: #1a1a2e;
    }

    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    header p  { opacity: 0.85; font-size: 1rem; }

    .search-bar {
      background: white;
      padding: 24px 20px;
      display: flex;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .search-bar form {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 640px;
    }
    .search-bar input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .search-bar input:focus { border-color: #667eea; }
    .search-bar button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .search-bar button:hover { opacity: 0.9; }
    .search-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      text-align: center;
      padding: 20px;
      font-size: 0.95rem;
      color: #666;
      display: none;
    }
    #status.visible { display: block; }

    #results {
      max-width: 960px;
      margin: 30px auto;
      padding: 0 20px 60px;
      display: none;
    }
    #results.visible { display: block; }

    .site-header {
      display: flex;
      align-items: center;
      gap: 16px;
      background: white;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .site-header img { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; }
    .site-header .info h2 { font-size: 1.2rem; font-weight: 700; }
    .site-header .info a { font-size: 0.85rem; color: #667eea; text-decoration: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card h3 {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 16px;
    }

    /* Colors */
    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .color-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .color-swatch {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .color-swatch:hover { transform: scale(1.1); }
    .color-chip span {
      font-size: 0.65rem;
      color: #666;
      font-family: monospace;
    }

    /* Fonts */
    .font-list { display: flex; flex-direction: column; gap: 10px; }
    .font-item {
      background: #f8f8fc;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .font-item .font-name { font-weight: 600; }
    .font-item .font-type { font-size: 0.72rem; color: #999; margin-top: 2px; }

    /* Social */
    .social-list { display: flex; flex-direction: column; gap: 10px; }
    .social-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #f8f8fc;
      border-radius: 8px;
      text-decoration: none;
      color: #1a1a2e;
      transition: background 0.15s;
    }
    .social-item:hover { background: #ededfa; }
    .social-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .social-item .platform { font-weight: 600; font-size: 0.9rem; text-transform: capitalize; }
    .social-item .url { font-size: 0.72rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }

    /* Logo / OG image */
    .asset-grid { display: flex; flex-direction: column; gap: 12px; }
    .asset-item img {
      max-width: 100%;
      max-height: 100px;
      border-radius: 8px;
      border: 1px solid #eee;
      object-fit: contain;
    }
    .asset-label { font-size: 0.72rem; color: #888; margin-bottom: 4px; }

    /* Theme color banner */
    .theme-banner {
      height: 8px;
      border-radius: 14px 14px 0 0;
      width: 100%;
      margin: -20px -24px 16px;
      padding: 0;
      width: calc(100% + 48px);
    }

    .empty { color: #bbb; font-size: 0.9rem; font-style: italic; }

    /* Tooltip on copy */
    .copied-toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 9999;
    }
    .copied-toast.show { opacity: 1; }

    /* Social colors */
    .soc-facebook  { background: #1877f2; color: white; }
    .soc-instagram { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); color: white; }
    .soc-twitter   { background: #000; color: white; }
    .soc-linkedin  { background: #0a66c2; color: white; }
    .soc-youtube   { background: #ff0000; color: white; }
    .soc-tiktok    { background: #000; color: white; }
    .soc-pinterest { background: #e60023; color: white; }
    .soc-github    { background: #333; color: white; }
    .soc-discord   { background: #5865f2; color: white; }
    .soc-whatsapp  { background: #25d366; color: white; }
    .soc-telegram  { background: #229ed9; color: white; }
    .soc-threads   { background: #000; color: white; }
    .soc-default   { background: #667eea; color: white; }
  </style>
</head>
<body>

<header>
  <h1>🎨 Brand Scraper</h1>
  <p>Enter any website URL to extract its brand identity instantly</p>
</header>

<div class="search-bar">
  <form id="scrapeForm">
    <input type="text" id="urlInput" placeholder="https://nike.com" autocomplete="off" />
    <button type="submit" id="scrapeBtn">Scrape Branding</button>
  </form>
</div>

<div id="status"></div>
<div id="results"></div>
<div class="copied-toast" id="toast">Copied to clipboard!</div>

<script>
  // ── CONFIG: Replace with your Render URL ──────────────────────────────────
  const API_URL = "https://scrape-zjie.onrender.com";
  // ──────────────────────────────────────────────────────────────────────────

  const SOCIAL_ICONS = {
    facebook: "f", instagram: "📸", twitter: "𝕏", linkedin: "in",
    youtube: "▶", tiktok: "♪", pinterest: "P", github: "⌥",
    discord: "💬", whatsapp: "✆", telegram: "✈", threads: "@",
  };

  const form = document.getElementById("scrapeForm");
  const urlInput = document.getElementById("urlInput");
  const btn = document.getElementById("scrapeBtn");
  const status = document.getElementById("status");
  const results = document.getElementById("results");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    let url = urlInput.value.trim();
    if (!url) return;
    if (!url.startsWith("http")) url = "https://" + url;

    btn.disabled = true;
    btn.textContent = "Scraping...";
    status.className = "visible";
    status.textContent = "⏳ Fetching brand data for " + url + " ...";
    results.className = "";
    results.innerHTML = "";

    try {
      const res = await fetch(API_URL + "/execute", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });
      if (!res.ok) throw new Error("API error " + res.status);
      const data = await res.json();
      renderResults(data);
      status.className = "";
    } catch (err) {
      status.textContent = "❌ Error: " + err.message + ". Make sure your API is running.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Scrape Branding";
    }
  });

  function renderResults(data) {
    const colors  = (data.primary_colors || "").split(",").map(c => c.trim()).filter(Boolean);
    const fonts   = (data.font_families  || "").split(",").map(f => f.trim()).filter(Boolean);
    const socials = parseSocials(data.social_links || "");

    let html = "";

    // Site header
    html += `<div class="site-header">`;
    if (data.favicon) html += `<img src="${data.favicon}" onerror="this.style.display='none'" />`;
    html += `<div class="info">
      <h2>${data.site_title || data.url}</h2>
      <a href="${data.url}" target="_blank">${data.url}</a>
    </div></div>`;

    html += `<div class="grid">`;

    // Colors card
    html += `<div class="card">`;
    if (data.theme_color) html += `<div class="theme-banner" style="background:${data.theme_color}"></div>`;
    html += `<h3>🎨 Brand Colors</h3>`;
    if (colors.length) {
      html += `<div class="color-grid">`;
      colors.forEach(c => {
        html += `<div class="color-chip">
          <div class="color-swatch" style="background:${c}" title="Click to copy" onclick="copyText('${c}')"></div>
          <span>${c}</span>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<p class="empty">No colors detected</p>`;
    }
    html += `</div>`;

    // Fonts card
    html += `<div class="card"><h3>🔤 Fonts</h3>`;
    if (fonts.length) {
      html += `<div class="font-list">`;
      fonts.forEach(f => {
        html += `<div class="font-item">
          <div class="font-name" style="font-family:'${f}',sans-serif">${f}</div>
        </div>`;
      });
      html += `</div>`;
    } else {
      html += `<p class="empty">No fonts detected</p>`;
    }
    html += `</div>`;

    // Social media card
    html += `<div class="card"><h3>🌐 Social Media</h3>`;
    if (socials.length) {
      html += `<div class="social-list">`;
      socials.forEach(s => {
        const icon = SOCIAL_ICONS[s.platform] || "🔗";
        html += `<a class="social-item" href="${s.url}" target="_blank">
          <div class="social-icon soc-${s.platform} soc-default">${icon}</div>
          <div>
            <div class="platform">${s.platform}</div>
            <div class="url">${s.url}</div>
          </div>
        </a>`;
      });
      html += `</div>`;
    } else {
      html += `<p class="empty">No social links found</p>`;
    }
    html += `</div>`;

    // Assets card
    html += `<div class="card"><h3>🖼️ Brand Assets</h3><div class="asset-grid">`;
    if (data.logo_url) {
      html += `<div><div class="asset-label">Logo</div>
        <img src="${data.logo_url}" onerror="this.parentElement.style.display='none'" /></div>`;
    }
    if (data.og_image) {
      html += `<div><div class="asset-label">Social Preview Image</div>
        <img src="${data.og_image}" onerror="this.parentElement.style.display='none'" /></div>`;
    }
    if (!data.logo_url && !data.og_image) html += `<p class="empty">No images detected</p>`;
    html += `</div></div>`;

    html += `</div>`; // end grid

    results.innerHTML = html;
    results.className = "visible";
  }

  function parseSocials(str) {
    if (!str) return [];
    return str.split(",").map(s => {
      const parts = s.trim().split(": ");
      return parts.length === 2 ? { platform: parts[0].trim(), url: parts[1].trim() } : null;
    }).filter(Boolean);
  }

  function copyText(text) {
    navigator.clipboard.writeText(text).then(() => {
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    });
  }
</script>
</body>
</html>
